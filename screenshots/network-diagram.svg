<svg width="860" height="580" viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e;font-family:Arial,Helvetica,sans-serif;">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Home network boundary -->
  <rect x="16" y="16" width="560" height="548" rx="14" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="30" y="38" font-size="12" fill="#6b7280">Home network</text>

  <!-- Internet zone -->
  <rect x="610" y="110" width="234" height="340" rx="12" fill="none" stroke="#374151" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="727" y="132" font-size="12" fill="#6b7280" text-anchor="middle">Internet</text>

  <!-- ROUTER -->
  <rect x="190" y="46" width="196" height="56" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.8"/>
  <text x="288" y="70" font-size="14" font-weight="bold" fill="#cecbf6" text-anchor="middle">Router / Gateway</text>
  <text x="288" y="90" font-size="12" fill="#afa9ec" text-anchor="middle">DNS pointed to Pi-hole IP</text>

  <!-- PI-HOLE -->
  <rect x="190" y="170" width="196" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.8"/>
  <text x="288" y="194" font-size="14" font-weight="bold" fill="#9fe1cb" text-anchor="middle">Pi-hole (FTL)</text>
  <text x="288" y="214" font-size="12" fill="#5dcaa5" text-anchor="middle">Raspberry Pi · port 53</text>

  <!-- BLOCKLIST DB -->
  <rect x="50" y="290" width="160" height="56" rx="8" fill="#4a1b0c" stroke="#f0997b" stroke-width="0.8"/>
  <text x="130" y="314" font-size="14" font-weight="bold" fill="#f5c4b3" text-anchor="middle">Blocklist DB</text>
  <text x="130" y="334" font-size="12" fill="#f0997b" text-anchor="middle">81,131 domains</text>

  <!-- GOOGLE DNS -->
  <rect x="628" y="152" width="196" height="56" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.8"/>
  <text x="726" y="176" font-size="14" font-weight="bold" fill="#b5d4f4" text-anchor="middle">Google DNS</text>
  <text x="726" y="196" font-size="12" fill="#85b7eb" text-anchor="middle">8.8.8.8 · DNSSEC</text>

  <!-- CLOUDFLARE DNS -->
  <rect x="628" y="248" width="196" height="56" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.8"/>
  <text x="726" y="272" font-size="14" font-weight="bold" fill="#b5d4f4" text-anchor="middle">Cloudflare DNS</text>
  <text x="726" y="292" font-size="12" fill="#85b7eb" text-anchor="middle">1.1.1.1 · DNSSEC</text>

  <!-- DEVICE ROW -->
  <rect x="36"  y="426" width="110" height="56" rx="8" fill="#2c2c2a" stroke="#888780" stroke-width="0.8"/>
  <text x="91"  y="450" font-size="13" font-weight="bold" fill="#d3d1c7" text-anchor="middle">Phone</text>
  <text x="91"  y="469" font-size="11" fill="#888780" text-anchor="middle">iPhone.lan</text>

  <rect x="166" y="426" width="110" height="56" rx="8" fill="#2c2c2a" stroke="#888780" stroke-width="0.8"/>
  <text x="221" y="450" font-size="13" font-weight="bold" fill="#d3d1c7" text-anchor="middle">Laptop</text>
  <text x="221" y="469" font-size="11" fill="#888780" text-anchor="middle">DHCP client</text>

  <rect x="296" y="426" width="110" height="56" rx="8" fill="#2c2c2a" stroke="#888780" stroke-width="0.8"/>
  <text x="351" y="450" font-size="13" font-weight="bold" fill="#d3d1c7" text-anchor="middle">Smart TV</text>
  <text x="351" y="469" font-size="11" fill="#888780" text-anchor="middle">DHCP client</text>

  <rect x="426" y="426" width="110" height="56" rx="8" fill="#2c2c2a" stroke="#888780" stroke-width="0.8"/>
  <text x="481" y="450" font-size="13" font-weight="bold" fill="#d3d1c7" text-anchor="middle">IoT Device</text>
  <text x="481" y="469" font-size="11" fill="#888780" text-anchor="middle">DHCP client</text>

  <!-- Devices to Router arrows -->
  <line x1="91"  y1="426" x2="252" y2="104" stroke="#4b5563" stroke-width="0.8" marker-end="url(#arr-gray)" fill="none"/>
  <line x1="221" y1="426" x2="268" y2="104" stroke="#4b5563" stroke-width="0.8" marker-end="url(#arr-gray)" fill="none"/>
  <line x1="351" y1="426" x2="300" y2="104" stroke="#4b5563" stroke-width="0.8" marker-end="url(#arr-gray)" fill="none"/>
  <line x1="481" y1="426" x2="320" y2="104" stroke="#4b5563" stroke-width="0.8" marker-end="url(#arr-gray)" fill="none"/>

  <!-- Router to Pi-hole -->
  <line x1="288" y1="102" x2="288" y2="168" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#arr)" fill="none"/>
  <!-- Label right of the arrow -->
  <text x="300" y="140" font-size="11" fill="#9ca3af">all DNS queries</text>

  <!-- Pi-hole to Blocklist -->
  <line x1="222" y1="226" x2="184" y2="288" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)" fill="none"/>
  <text x="178" y="264" font-size="11" fill="#9ca3af" text-anchor="end">check</text>

  <!-- Blocklist blocked reply — red curved arrow going back up, label safely left -->
  <path d="M170 290 Q120 258 206 228" stroke="#f87171" stroke-width="1.4" fill="none" marker-end="url(#arr-red)"/>
  <text x="68" y="256" font-size="11" fill="#f87171">blocked →</text>
  <text x="68" y="271" font-size="11" fill="#f87171">NXDOMAIN</text>

  <!-- Pi-hole to Google DNS (green) -->
  <line x1="386" y1="192" x2="626" y2="180" stroke="#4ade80" stroke-width="1.4" marker-end="url(#arr-green)" fill="none"/>
  <text x="506" y="178" font-size="11" fill="#4ade80" text-anchor="middle">allowed query</text>

  <!-- Google DNS reply (dashed gray) -->
  <line x1="626" y1="196" x2="386" y2="206" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)" fill="none"/>

  <!-- Pi-hole to Cloudflare (lighter dashed green) -->
  <path d="M386 210 Q508 234 626 266" stroke="#4ade80" stroke-width="0.9" stroke-dasharray="4 3" fill="none" opacity="0.45" marker-end="url(#arr-green)"/>

  <!-- LEGEND -->
  <line x1="16" y1="530" x2="844" y2="530" stroke="#374151" stroke-width="0.8"/>

  <line x1="30"  y1="554" x2="54"  y2="554" stroke="#4ade80" stroke-width="2"/>
  <text x="60"  y="559" font-size="12" fill="#9ca3af">Allowed → upstream DNS</text>

  <line x1="240" y1="554" x2="264" y2="554" stroke="#f87171" stroke-width="2"/>
  <text x="270" y="559" font-size="12" fill="#9ca3af">Blocked → NXDOMAIN</text>

  <line x1="460" y1="554" x2="484" y2="554" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="490" y="559" font-size="12" fill="#9ca3af">DNS response</text>

  <line x1="640" y1="554" x2="664" y2="554" stroke="#4b5563" stroke-width="1.5"/>
  <text x="670" y="559" font-size="12" fill="#9ca3af">Device query</text>

</svg>
